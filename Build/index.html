<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Aqua Guard</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Exo+2:wght@300;400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ── MOBILE PERFORMANCE: reduce paint/composite cost ── */
      @media (max-width: 768px), (hover: none) and (pointer: coarse) {
        *, *::before, *::after {
          animation-duration: 0s !important;
          animation-delay: 0s !important;
          transition-duration: 0.1s !important;
        }
        /* Re-enable only critical animations */
        #unity-progress-bar-full {
          transition-duration: 0.28s !important;
        }
        .play-circle {
          animation: none !important;
        }
        .rring {
          display: none !important;
        }
        .ray {
          display: none !important;
        }
        .bbl:nth-child(n+3) {
          display: none !important;
        }
        .ocean-scene::before,
        .ocean-scene::after {
          display: none !important;
        }
        .water-surface {
          animation: none !important;
          box-shadow: none !important;
        }
        .hud-corner {
          display: none !important;
        }
        .depth-lines {
          display: none !important;
        }
        .logo-droplet {
          animation: none !important;
          filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.5)) !important;
        }
        .dpad-btn, .action-btn {
          box-shadow: none !important;
          transition: none !important;
        }
        .dpad-btn svg, .action-btn svg {
          filter: none !important;
        }
      }

      /* ══════════════════════════════════════
       الخلاصة: تظبيط شاشة اللعبة والـ Letterboxing
    ══════════════════════════════════════ */
      body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: "Exo 2", sans-serif;
      }

      #unity-container {
        position: relative;
        /* المعادلة دي بتجبره دايماً يبقى 16:9 وميطلعش بره الشاشة أبداً */
        width: 100%;
        height: 100%;
        max-width: calc(100vh * (16 / 9));
        max-height: calc(100vw * (9 / 16));
        z-index: 1;
      }

      #unity-canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
        background: #000;
      }

      #unity-container.game-ready {
        z-index: 30;
      }

      /* ══════════════════════════════════════
       MOBILE TOUCH CONTROLS
    ══════════════════════════════════════ */
      #mobile-controls {
        display: none;
        position: absolute; /* اتعدلت لـ absolute عشان تلزق في اللعبة مش الشاشة */
        inset: 0;
        z-index: 50;
        pointer-events: none;
      }
      #mobile-controls.active {
        display: block;
      }

      /* ── D-PAD — bottom-left ── */
      .dpad {
        position: absolute;
        bottom: 18px;
        left: 12px;
        width: 150px;
        height: 150px;
        pointer-events: auto;
      }
      .dpad-btn {
        position: absolute;
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: rgba(0, 10, 15, 0.65);
        border: 1.5px solid rgba(0, 240, 255, 0.5);
        box-shadow:
          0 0 8px rgba(0, 240, 255, 0.15),
          inset 0 0 6px rgba(0, 240, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        transition:
          background 0.08s,
          transform 0.08s,
          box-shadow 0.08s;
        cursor: pointer;
      }
      .dpad-btn svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: rgba(0, 240, 255, 0.9);
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 4px rgba(0, 240, 255, 0.4));
      }
      .dpad-btn.pressed {
        background: rgba(0, 240, 255, 0.4);
        border-color: rgba(0, 240, 255, 0.9);
        box-shadow:
          0 0 18px rgba(0, 240, 255, 0.5),
          inset 0 0 12px rgba(0, 240, 255, 0.15);
        transform: scale(0.88);
      }
      .dpad-btn.pressed svg {
        stroke: #fff;
        filter: drop-shadow(0 0 8px rgba(0, 240, 255, 1));
      }
      .dpad-up {
        top: 0;
        left: 51px;
      }
      .dpad-down {
        bottom: 0;
        left: 51px;
      }
      .dpad-left {
        top: 51px;
        left: 0;
      }
      .dpad-right {
        top: 51px;
        right: 0;
      }

      /* ── INTERACT BUTTON — bottom-right ── */
      .action-btn {
        position: absolute;
        bottom: 36px;
        right: 16px;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 38% 32%,
          rgba(0, 240, 255, 0.25),
          rgba(0, 10, 15, 0.8)
        );
        border: 2px solid rgba(0, 240, 255, 0.6);
        box-shadow:
          0 0 0 4px rgba(0, 240, 255, 0.08),
          0 0 16px rgba(0, 240, 255, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 3px;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        pointer-events: auto;
        transition:
          background 0.08s,
          transform 0.08s,
          box-shadow 0.08s;
        cursor: pointer;
      }
      .action-btn svg {
        width: 24px;
        height: 24px;
        fill: none;
        stroke: rgba(0, 240, 255, 0.9);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 4px rgba(0, 240, 255, 0.4));
      }
      .action-btn .key-label {
        font-family: "Exo 2", sans-serif;
        font-size: 7px;
        font-weight: 700;
        color: rgba(0, 240, 255, 0.7);
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }
      .action-btn.pressed {
        background: radial-gradient(
          circle at 38% 32%,
          rgba(0, 240, 255, 0.5),
          rgba(0, 10, 15, 0.6)
        );
        border-color: rgba(0, 240, 255, 1);
        box-shadow:
          0 0 0 5px rgba(0, 240, 255, 0.15),
          0 0 30px rgba(0, 240, 255, 0.6);
        transform: scale(0.85);
      }
      .action-btn.pressed svg {
        stroke: #fff;
        filter: drop-shadow(0 0 10px rgba(0, 240, 255, 1));
      }
      .action-btn.pressed .key-label {
        color: #fff;
      }

      /* ── Mobile play screen adjustments ── */
      @media (max-width: 768px) {
        .logo-main {
          font-size: clamp(1rem, 6vw, 1.6rem);
        }
        .logo-sub {
          font-size: clamp(6px, 2vw, 9px);
          letter-spacing: 3px;
        }
        .logo-droplet {
          width: 36px;
          height: 36px;
          margin-bottom: 10px;
        }
        .logo-block {
          margin-bottom: 30px;
        }
        .ripple-field {
          width: 120px;
          height: 120px;
        }
        .play-circle {
          width: 80px;
          height: 80px;
        }
        .triangle {
          border-top: 14px solid transparent;
          border-bottom: 14px solid transparent;
          border-left: 24px solid var(--w);
          margin-left: 7px;
        }
        .play-label {
          font-size: clamp(0.28rem, 2vw, 0.42rem);
        }
        .bar-outer {
          width: clamp(160px, 60vw, 280px);
          height: 12px;
        }
        .loading-title {
          font-size: clamp(0.28rem, 2vw, 0.4rem);
        }
        .load-icon {
          width: 40px;
          height: 40px;
        }
        .bar-pct {
          font-size: clamp(0.24rem, 1.5vw, 0.34rem);
        }

        .ocean-scene::after {
          display: none !important;
        }
        .ocean-scene::before {
          display: none !important;
        }
        .bbl:nth-child(n + 4) {
          display: none !important;
        }
        .ray:nth-child(n + 3) {
          display: none !important;
        }
        .rring {
          animation-duration: 4s;
        }
        .play-circle {
          animation: none;
        }
        #mobile-fs-prompt {
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
        }
        #unity-canvas {
          will-change: contents;
        }
        .hud-corner {
          display: none;
        }
        .depth-lines {
          display: none;
        }
        .water-surface {
          animation: none;
        }
      }

      /* ── TINY VIEWPORT ── */
      @media (max-height: 360px) {
        .logo-droplet {
          width: 22px;
          height: 22px;
          margin-bottom: 4px;
        }
        .logo-block {
          margin-bottom: 10px;
        }
        .logo-main {
          font-size: clamp(0.6rem, 4vw, 1rem);
        }
        .logo-sub {
          font-size: 6px;
          letter-spacing: 2px;
          margin-top: 4px;
        }
        .play-cluster {
          gap: 8px;
        }
        .ripple-field {
          width: 70px;
          height: 70px;
        }
        .play-circle {
          width: 54px;
          height: 54px;
        }
        .triangle {
          border-top: 9px solid transparent;
          border-bottom: 9px solid transparent;
          border-left: 16px solid var(--w);
          margin-left: 5px;
        }
        .play-label {
          font-size: 5px;
          letter-spacing: 3px;
        }
        .rring {
          display: none;
        }
        .bar-outer {
          width: clamp(120px, 50vw, 200px);
          height: 8px;
        }
        .loading-title {
          font-size: 5px;
          letter-spacing: 3px;
        }
        .load-icon {
          width: 28px;
          height: 28px;
        }
        .bar-pct {
          font-size: 5px;
        }
      }

      /* ── VERY SMALL WIDTH ── */
      @media (max-width: 420px) {
        .logo-main {
          font-size: clamp(0.55rem, 5vw, 0.9rem);
        }
        .logo-sub {
          font-size: clamp(5px, 1.5vw, 7px);
          letter-spacing: 2px;
        }
        .logo-droplet {
          width: 24px;
          height: 24px;
          margin-bottom: 6px;
        }
        .logo-block {
          margin-bottom: 14px;
        }
        .ripple-field {
          width: 80px;
          height: 80px;
        }
        .play-circle {
          width: 58px;
          height: 58px;
        }
        .triangle {
          border-top: 10px solid transparent;
          border-bottom: 10px solid transparent;
          border-left: 18px solid var(--w);
          margin-left: 5px;
        }
        .play-label {
          font-size: clamp(4px, 1.5vw, 6px);
        }
        .play-cluster {
          gap: 10px;
        }
      }



      :root {
        --w: #00f0ff;
        --w2: #0077b6;
        --dark: #020d10;
        --glow-w: rgba(0, 240, 255, 0.45);
      }

      #unity-footer {
        display: none;
      }
      #unity-warning {
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 500;
        max-width: calc(100% - 16px);
      }

      /* ══════════════════════════════════════
       SHARED OCEAN SCENE BACKGROUND
    ══════════════════════════════════════ */
      .ocean-scene {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 120% 50% at 50% 105%,
            rgba(0, 80, 160, 0.7) 0%,
            transparent 65%
          ),
          radial-gradient(
            ellipse 80% 35% at 50% -5%,
            rgba(0, 180, 220, 0.18) 0%,
            transparent 60%
          ),
          linear-gradient(
            180deg,
            #020d10 0%,
            #041a24 30%,
            #062233 65%,
            #030f18 100%
          );
      }
      .ocean-scene::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: linear-gradient(
          180deg,
          transparent 0%,
          black 40%,
          black 70%,
          transparent 100%
        );
      }
      .ocean-scene::after {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.05) 2px,
          rgba(0, 0, 0, 0.05) 4px
        );
      }

      .rays {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      .ray {
        position: absolute;
        top: -20%;
        width: 1px;
        height: 120%;
        background: linear-gradient(
          180deg,
          rgba(0, 240, 255, 0.11) 0%,
          rgba(0, 240, 255, 0.03) 60%,
          transparent 100%
        );
        transform-origin: top center;
        animation: rayDrift ease-in-out infinite alternate;
      }
      .ray:nth-child(1) {
        left: 14%;
        width: 75px;
        animation-duration: 9s;
        animation-delay: 0s;
        transform: rotate(-8deg);
      }
      .ray:nth-child(2) {
        left: 34%;
        width: 38px;
        animation-duration: 12s;
        animation-delay: -3s;
        transform: rotate(3deg);
      }
      .ray:nth-child(3) {
        left: 54%;
        width: 95px;
        animation-duration: 10s;
        animation-delay: -6s;
        transform: rotate(-4deg);
      }
      .ray:nth-child(4) {
        left: 74%;
        width: 52px;
        animation-duration: 8s;
        animation-delay: -2s;
        transform: rotate(7deg);
      }
      .ray:nth-child(5) {
        left: 87%;
        width: 32px;
        animation-duration: 13s;
        animation-delay: -8s;
        transform: rotate(-6deg);
      }
      @keyframes rayDrift {
        from {
          opacity: 0.6;
        }
        to {
          opacity: 0.15;
        }
      }

      .water-surface {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(0, 240, 255, 0.6) 25%,
          rgba(0, 240, 255, 0.9) 50%,
          rgba(0, 240, 255, 0.6) 75%,
          transparent 100%
        );
        box-shadow:
          0 0 18px rgba(0, 240, 255, 0.5),
          0 2px 36px rgba(0, 240, 255, 0.2);
        animation: surfaceShimmer 4s ease-in-out infinite alternate;
      }
      @keyframes surfaceShimmer {
        from {
          opacity: 0.7;
        }
        to {
          opacity: 1;
        }
      }

      .bubbles {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      .bbl {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(0, 240, 255, 0.28);
        background: rgba(0, 240, 255, 0.04);
        animation: bblRise linear infinite;
      }
      .bbl:nth-child(1) {
        width: 5px;
        height: 5px;
        left: 7%;
        animation-duration: 7s;
        animation-delay: 0s;
      }
      .bbl:nth-child(2) {
        width: 9px;
        height: 9px;
        left: 20%;
        animation-duration: 10s;
        animation-delay: 1.8s;
      }
      .bbl:nth-child(3) {
        width: 4px;
        height: 4px;
        left: 35%;
        animation-duration: 6s;
        animation-delay: 3.2s;
      }
      .bbl:nth-child(4) {
        width: 7px;
        height: 7px;
        left: 50%;
        animation-duration: 8.5s;
        animation-delay: 0.6s;
      }
      .bbl:nth-child(5) {
        width: 11px;
        height: 11px;
        left: 65%;
        animation-duration: 12s;
        animation-delay: 2.4s;
      }
      .bbl:nth-child(6) {
        width: 6px;
        height: 6px;
        left: 80%;
        animation-duration: 9s;
        animation-delay: 4.5s;
      }
      .bbl:nth-child(7) {
        width: 8px;
        height: 8px;
        left: 91%;
        animation-duration: 7.5s;
        animation-delay: 1s;
      }
      @keyframes bblRise {
        0% {
          transform: translateY(108vh) scale(0.7);
          opacity: 0;
        }
        8% {
          opacity: 1;
        }
        90% {
          opacity: 0.5;
        }
        100% {
          transform: translateY(-6vh) scale(1.15);
          opacity: 0;
        }
      }

      .hud-corner {
        position: absolute;
        width: 40px;
        height: 40px;
        border-color: rgba(0, 240, 255, 0.22);
        border-style: solid;
        pointer-events: none;
      }
      .hud-corner.tl {
        top: 16px;
        left: 16px;
        border-width: 1px 0 0 1px;
      }
      .hud-corner.tr {
        top: 16px;
        right: 16px;
        border-width: 1px 1px 0 0;
      }
      .hud-corner.bl {
        bottom: 16px;
        left: 16px;
        border-width: 0 0 1px 1px;
      }
      .hud-corner.br {
        bottom: 16px;
        right: 16px;
        border-width: 0 1px 1px 0;
      }

      .depth-lines {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 6px;
        pointer-events: none;
      }
      .depth-line {
        height: 1px;
        background: linear-gradient(90deg, rgba(0, 240, 255, 0.3), transparent);
        animation: depthPulse 3s ease-in-out infinite;
      }
      .depth-line:nth-child(1) {
        width: 24px;
        animation-delay: 0s;
      }
      .depth-line:nth-child(2) {
        width: 14px;
        animation-delay: 0.4s;
      }
      .depth-line:nth-child(3) {
        width: 28px;
        animation-delay: 0.8s;
      }
      .depth-line:nth-child(4) {
        width: 10px;
        animation-delay: 1.2s;
      }
      .depth-line:nth-child(5) {
        width: 20px;
        animation-delay: 1.6s;
      }
      @keyframes depthPulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.9;
        }
      }

      /* ══════════════════════════════════════
       SCREEN 1 — PRESS TO PLAY
    ══════════════════════════════════════ */
      #screen-play {
        position: absolute;
        inset: 0;
        z-index: 200;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: opacity 0.45s ease;
      }

      .logo-block {
        position: relative;
        z-index: 2;
        text-align: center;
        margin-bottom: 48px;
        animation: logoReveal 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes logoReveal {
        from {
          opacity: 0;
          transform: translateY(-24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo-droplet {
        width: 48px;
        height: 48px;
        display: block;
        margin: 0 auto 14px;
        filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.7));
        animation: dropPulse 3s ease-in-out infinite;
      }
      @keyframes dropPulse {
        0%,
        100% {
          filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.6));
        }
        50% {
          filter: drop-shadow(0 0 26px rgba(0, 240, 255, 1));
        }
      }

      .logo-main {
        display: block;
        font-family: "Press Start 2P", monospace;
        font-size: clamp(1.4rem, 4vw, 2.6rem);
        line-height: 1.2;
      }
      .logo-main .aqua {
        color: #fff;
        text-shadow:
          0 0 14px rgba(255, 255, 255, 0.25),
          4px 4px 0 #0a2a1a;
      }
      .logo-main .guard {
        color: var(--w);
        text-shadow:
          0 0 22px var(--glow-w),
          4px 4px 0 #003755;
      }

      .logo-sub {
        display: block;
        font-family: "Exo 2", sans-serif;
        font-size: clamp(8px, 1.1vw, 11px);
        font-weight: 300;
        letter-spacing: 6px;
        color: rgba(0, 240, 255, 0.5);
        text-transform: uppercase;
        margin-top: 10px;
      }

      .play-cluster {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        animation: clusterReveal 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
      }
      @keyframes clusterReveal {
        from {
          opacity: 0;
          transform: translateY(22px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .ripple-field {
        position: relative;
        width: 160px;
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .rring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1px solid rgba(0, 240, 255, 0.18);
        animation: rringPop 2.8s ease-out infinite;
      }
      .rring:nth-child(2) {
        animation-delay: 0.93s;
      }
      .rring:nth-child(3) {
        animation-delay: 1.86s;
      }
      @keyframes rringPop {
        0% {
          transform: scale(0.45);
          opacity: 0.9;
        }
        100% {
          transform: scale(2.3);
          opacity: 0;
        }
      }

      .play-circle {
        position: relative;
        z-index: 2;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          circle at 38% 32%,
          rgba(0, 240, 255, 0.18),
          rgba(2, 13, 20, 0.92)
        );
        border: 2px solid var(--w);
        box-shadow:
          0 0 0 8px rgba(0, 240, 255, 0.06),
          0 0 32px rgba(0, 240, 255, 0.35),
          inset 0 0 28px rgba(0, 0, 0, 0.55);
        transition:
          transform 0.2s cubic-bezier(0.22, 1, 0.36, 1),
          box-shadow 0.3s ease;
        animation: playPulse 2.8s ease-in-out infinite;
      }
      @keyframes playPulse {
        0%,
        100% {
          box-shadow:
            0 0 0 8px rgba(0, 240, 255, 0.06),
            0 0 30px rgba(0, 240, 255, 0.3),
            inset 0 0 28px rgba(0, 0, 0, 0.55);
        }
        50% {
          box-shadow:
            0 0 0 14px rgba(0, 240, 255, 0.04),
            0 0 60px rgba(0, 240, 255, 0.65),
            inset 0 0 28px rgba(0, 0, 0, 0.55);
        }
      }
      #screen-play:hover .play-circle {
        transform: scale(1.09);
        box-shadow:
          0 0 0 12px rgba(0, 240, 255, 0.08),
          0 0 75px rgba(0, 240, 255, 0.85),
          inset 0 0 28px rgba(0, 0, 0, 0.55);
      }
      #screen-play:active .play-circle {
        transform: scale(0.95);
      }

      .triangle {
        width: 0;
        height: 0;
        border-top: 20px solid transparent;
        border-bottom: 20px solid transparent;
        border-left: 34px solid var(--w);
        margin-left: 10px;
        filter: drop-shadow(0 0 10px var(--glow-w));
      }
      #screen-play:hover .triangle {
        filter: drop-shadow(0 0 18px rgba(0, 255, 255, 0.95));
      }

      .play-label {
        font-family: "Press Start 2P", monospace;
        font-size: clamp(0.34rem, 0.9vw, 0.5rem);
        color: rgba(0, 240, 255, 0.6);
        letter-spacing: 5px;
        text-transform: uppercase;
        animation: labelBlink 2.2s ease-in-out infinite;
      }
      @keyframes labelBlink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }

      /* ══════════════════════════════════════
       SCREEN 2 — LOADING
    ══════════════════════════════════════ */
      #screen-loading {
        position: absolute;
        inset: 0;
        z-index: 200;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }

      .load-icon {
        width: 52px;
        height: 52px;
        filter: drop-shadow(0 0 14px rgba(0, 240, 255, 0.7));
        animation:
          loadSpin 4s linear infinite,
          dropPulse 2s ease-in-out infinite;
      }
      @keyframes loadSpin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .loading-title {
        font-family: "Press Start 2P", monospace;
        font-size: clamp(0.32rem, 0.85vw, 0.48rem);
        color: rgba(0, 240, 255, 0.8);
        letter-spacing: 5px;
        animation: labelBlink 1s ease-in-out infinite;
      }

      .bar-outer {
        width: clamp(200px, 42vw, 340px);
        height: 14px;
        border-radius: 7px;
        border: 1px solid rgba(0, 240, 255, 0.28);
        background: rgba(0, 0, 0, 0.5);
        overflow: hidden;
        position: relative;
        box-shadow: 0 0 14px rgba(0, 240, 255, 0.12);
      }
      .bar-outer::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 10px,
          rgba(255, 255, 255, 0.02) 10px,
          rgba(255, 255, 255, 0.02) 11px
        );
      }
      #unity-progress-bar-full {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #0077b6, var(--w), #00ff88);
        background-size: 200% 100%;
        border-radius: 7px;
        transition: width 0.28s ease;
        box-shadow: 0 0 14px rgba(0, 240, 255, 0.55);
        animation: barShimmer 2s linear infinite;
        position: relative;
      }
      @keyframes barShimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      #unity-progress-bar-full::after {
        content: "";
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #fff;
        box-shadow:
          0 0 8px var(--w),
          0 0 18px var(--glow-w);
      }

      .bar-pct {
        font-family: "Press Start 2P", monospace;
        font-size: clamp(0.28rem, 0.72vw, 0.4rem);
        color: rgba(0, 240, 255, 0.55);
        letter-spacing: 3px;
      }
    </style>
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"
    />
  </head>
  <body>
    <!-- ① Unity container + canvas -->
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" tabindex="-1"></canvas>

      <!-- ④ زراير الموبايل بقت هنا جوه الـ container عشان تلزق في زوايا اللعبة -->
      <div id="mobile-controls">
        <div class="dpad">
          <div class="dpad-btn dpad-up" data-key="w">
            <svg viewBox="0 0 24 24"><polyline points="6 15 12 9 18 15" /></svg>
          </div>
          <div class="dpad-btn dpad-left" data-key="a">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6" /></svg>
          </div>
          <div class="dpad-btn dpad-right" data-key="d">
            <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18" /></svg>
          </div>
          <div class="dpad-btn dpad-down" data-key="s">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9" /></svg>
          </div>
        </div>
        <div class="action-btn" data-key="e">
          <svg viewBox="0 0 24 24">
            <path d="M8 13V5.5a1.5 1.5 0 0 1 3 0V12" />
            <path d="M11 5.5v-2a1.5 1.5 0 0 1 3 0V12" />
            <path d="M14 5.5a1.5 1.5 0 0 1 3 0V12" />
            <path
              d="M17 7.5a1.5 1.5 0 0 1 3 0V16a6 6 0 0 1-6 6H12a6 6 0 0 1-6-6v-1.5"
            />
            <path d="M6 14.5a1.5 1.5 0 0 1-3 0v-5a1.5 1.5 0 0 1 3 0" />
          </svg>
          <span class="key-label">INTERACT</span>
        </div>
      </div>
    </div>

    <div id="unity-warning"></div>

    <!-- ② SCREEN 1 : PRESS TO PLAY -->
    <div id="screen-play">
      <div class="ocean-scene">
        <div class="water-surface"></div>
        <div class="rays">
          <div class="ray"></div>
          <div class="ray"></div>
          <div class="ray"></div>
          <div class="ray"></div>
          <div class="ray"></div>
        </div>
        <div class="bubbles">
          <div class="bbl"></div>
          <div class="bbl"></div>
          <div class="bbl"></div>
          <div class="bbl"></div>
          <div class="bbl"></div>
          <div class="bbl"></div>
          <div class="bbl"></div>
        </div>
      </div>
      <div class="hud-corner tl"></div>
      <div class="hud-corner tr"></div>
      <div class="hud-corner bl"></div>
      <div class="hud-corner br"></div>
      <div class="depth-lines">
        <div class="depth-line"></div>
        <div class="depth-line"></div>
        <div class="depth-line"></div>
        <div class="depth-line"></div>
        <div class="depth-line"></div>
      </div>

      <!-- Logo -->
      <div class="logo-block">
        <svg class="logo-droplet" viewBox="0 0 48 56" fill="none">
          <defs>
            <linearGradient id="dg1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#00f0ff" />
              <stop offset="100%" stop-color="#0077b6" />
            </linearGradient>
          </defs>
          <path
            d="M24 2 C24 2 4 26 4 38 C4 49 13 54 24 54 C35 54 44 49 44 38 C44 26 24 2 24 2 Z"
            fill="url(#dg1)"
            opacity=".9"
          />
          <path
            d="M16 36 C16 36 14 42 20 46"
            stroke="rgba(255,255,255,.45)"
            stroke-width="2"
            stroke-linecap="round"
            fill="none"
          />
        </svg>
        <span class="logo-main">
          <span class="aqua">AQUA</span><span class="guard">GUARD</span>
        </span>
        <span class="logo-sub">Protect the Nile · Guard the Water</span>
      </div>

      <!-- Play button -->
      <div class="play-cluster">
        <div class="ripple-field">
          <div class="rring"></div>
          <div class="rring"></div>
          <div class="rring"></div>
          <div class="play-circle">
            <div class="triangle"></div>
          </div>
        </div>
        <div class="play-label">Press to Play</div>
      </div>
    </div>

    <!-- ③ SCREEN 2 : LOADING -->
    <div id="screen-loading">
      <div class="ocean-scene">
        <div class="water-surface"></div>
        <div class="bubbles">
          <div class="bbl"></div>
          <div class="bbl"></div>
          <div class="bbl"></div>
          <div class="bbl"></div>
          <div class="bbl"></div>
        </div>
      </div>
      <div class="hud-corner tl"></div>
      <div class="hud-corner tr"></div>
      <div class="hud-corner bl"></div>
      <div class="hud-corner br"></div>

      <!-- spinning droplet -->
      <svg class="load-icon" viewBox="0 0 48 56" fill="none">
        <defs>
          <linearGradient id="dg2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#00f0ff" />
            <stop offset="100%" stop-color="#0077b6" />
          </linearGradient>
        </defs>
        <path
          d="M24 2 C24 2 4 26 4 38 C4 49 13 54 24 54 C35 54 44 49 44 38 C44 26 24 2 24 2 Z"
          fill="url(#dg2)"
          opacity=".85"
        />
      </svg>

      <div class="loading-title">Loading…</div>

      <div class="bar-outer">
        <div id="unity-progress-bar-full"></div>
      </div>
      <div class="bar-pct" id="pct-text">0%</div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var container = document.querySelector("#unity-container");
      var screenPlay = document.querySelector("#screen-play");
      var screenLoad = document.querySelector("#screen-loading");
      var pctText = document.querySelector("#pct-text");
      var progressBar = document.querySelector("#unity-progress-bar-full");
      var unityInst = null;
      var loadStarted = false;

      function unityShowBanner(msg, type) {
        var wb = document.querySelector("#unity-warning");
        function upd() {
          wb.style.display = wb.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        wb.appendChild(div);
        if (type === "error")
          div.style.cssText =
            "background:rgba(180,20,20,.9);color:#fff;padding:8px 14px;border-radius:5px;margin:3px;font-size:12px;";
        else if (type === "warning")
          div.style.cssText =
            "background:rgba(180,140,0,.9);color:#000;padding:8px 14px;border-radius:5px;margin:3px;font-size:12px;";
        else
          setTimeout(function () {
            wb.removeChild(div);
            upd();
          }, 5000);
        upd();
      }

      var buildUrl = "Build";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Build.data.unityweb",
        frameworkUrl: buildUrl + "/Build.framework.js.unityweb",
        codeUrl: buildUrl + "/Build.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Aqua Guard",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      var isMobileDevice =
        /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ||
        window.innerWidth < 768;

      if (isMobileDevice) {
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
        /* Mobile: render at native 1x, no upscaling */
        config.devicePixelRatio = 1;
        config.webglContextAttributes = {
          alpha: false,
          antialias: false,
          depth: true,
          stencil: false,
          premultipliedAlpha: false,
          preserveDrawingBuffer: false,
          powerPreference: 'low-power',
          failIfMajorPerformanceCaveat: false,
          desynchronized: true
        };
      } else {
        config.devicePixelRatio = Math.min(window.devicePixelRatio || 1, 2);
      }


      function startLoading() {
        if (loadStarted) return;
        loadStarted = true;

        screenPlay.style.opacity = "0";
        setTimeout(function () {
          screenPlay.style.display = "none";

          screenLoad.style.display = "flex";
          screenLoad.style.opacity = "0";
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              screenLoad.style.transition = "opacity .35s ease";
              screenLoad.style.opacity = "1";
            });
          });
        }, 450);

        var script = document.createElement("script");
        script.src = buildUrl + "/Build.loader.js";

        script.onload = function () {
          createUnityInstance(canvas, config, function (progress) {
            var pct = Math.round(progress * 100);
            if (progressBar) progressBar.style.width = pct + "%";
            if (pctText) pctText.textContent = pct + "%";
          })
            .then(function (instance) {
              unityInst = instance;

              screenLoad.style.transition = "opacity .6s ease";
              screenLoad.style.opacity = "0";
              setTimeout(function () {
                screenLoad.style.display = "none";
                container.classList.add("game-ready");
                canvas.focus();

                if (isMobileDevice) {
                  document
                    .getElementById("mobile-controls")
                    .classList.add("active");
                  initMobileControls();

                  /* ── PERF: Try to cap framerate to 30fps ── */
                  try {
                    instance.SendMessage('GameManager', 'SetTargetFrameRate', 30);
                  } catch(e) {}
                }

                /* Remove play/loading screen DOM to free memory */
                try {
                  var sp = document.getElementById('screen-play');
                  var sl = document.getElementById('screen-loading');
                  if (sp) sp.remove();
                  if (sl) sl.remove();
                } catch(e) {}

                try {
                  window.parent.postMessage({ type: "AQUAGUARD_READY" }, "*");
                } catch (e) {}
              }, 600);
            })
            .catch(function (err) {
              alert(err);
            });
        };

        script.onerror = function () {
          alert("Failed to load game. Please check your Build files.");
        };

        document.body.appendChild(script);
      }

      screenPlay.addEventListener("click", startLoading);
      screenPlay.addEventListener("touchstart", startLoading, { passive: true });

      window.addEventListener("message", function (e) {
        if (!e.data) return;
        if (e.data.type === "AQUAGUARD_START") startLoading();
        if (e.data.type === "AQUAGUARD_FULLSCREEN" && unityInst) {
          if (isMobileDevice) {
            var fsEl =
              document.fullscreenElement || document.webkitFullscreenElement;
            if (fsEl) {
              if (document.exitFullscreen) document.exitFullscreen();
              else if (document.webkitExitFullscreen)
                document.webkitExitFullscreen();
            } else {
              var el = document.documentElement;
              if (el.requestFullscreen) el.requestFullscreen();
              else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            }
          } else {
            unityInst.SetFullscreen(1);
          }
        }
      });

      function initMobileControls() {
        var KEY_MAP = {
          w: { code: "KeyW", keyCode: 87 },
          a: { code: "KeyA", keyCode: 65 },
          s: { code: "KeyS", keyCode: 83 },
          d: { code: "KeyD", keyCode: 68 },
          e: { code: "KeyE", keyCode: 69 },
        };

        function fireKey(type, key) {
          var info = KEY_MAP[key];
          if (!info) return;
          var evt = new KeyboardEvent(type, {
            key: key,
            code: info.code,
            keyCode: info.keyCode,
            which: info.keyCode,
            bubbles: true,
            cancelable: true,
          });
          canvas.dispatchEvent(evt);
        }

        var allBtns = document.querySelectorAll(".dpad-btn, .action-btn");
        allBtns.forEach(function (btn) {
          var key = btn.getAttribute("data-key");

          btn.addEventListener(
            "touchstart",
            function (e) {
              e.preventDefault();
              btn.classList.add("pressed");
              fireKey("keydown", key);
            },
            { passive: false },
          );

          btn.addEventListener(
            "touchend",
            function (e) {
              e.preventDefault();
              btn.classList.remove("pressed");
              fireKey("keyup", key);
            },
            { passive: false },
          );

          btn.addEventListener("touchcancel", function () {
            btn.classList.remove("pressed");
            fireKey("keyup", key);
          });

          btn.addEventListener("mousedown", function (e) {
            e.preventDefault();
            btn.classList.add("pressed");
            fireKey("keydown", key);
          });
          btn.addEventListener("mouseup", function (e) {
            e.preventDefault();
            btn.classList.remove("pressed");
            fireKey("keyup", key);
          });
          btn.addEventListener("mouseleave", function () {
            if (btn.classList.contains("pressed")) {
              btn.classList.remove("pressed");
              fireKey("keyup", key);
            }
          });
        });
      }
    </script>
  </body>
</html>
